name: Deploy to EdgeOne

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies and build cover-tool
      run: |
        cd cover-tool
        npm install
        npm run build
        cp -r dist/* .
        
    - name: Create deploy directory
      run: |
        mkdir -p deploy
        cp index.html deploy/
        cp -r cover-tool deploy/
        cp -r watermark-tool deploy/
        
    - name: Deploy to EdgeOne (Manual Step)
      run: |
        echo "Deploy directory ready!"
        echo "Please upload the 'deploy' folder to EdgeOne static hosting"
        ls -la deploy/