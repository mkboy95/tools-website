<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线工具集 - Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .tool-card {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .tool-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .tool-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .tool-card h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #333;
        }

        .tool-card p {
            color: #666;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .coming-soon {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 15px;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 60px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛠️ 在线工具集</h1>
            <p>简单、高效、实用的在线工具</p>
        </header>

        <div class="tools-grid">
            <a href="cover-tool/index.html" class="tool-card">
                <div class="tool-icon">🎨</div>
                <h2>封面设计工具</h2>
                <p>快速创建精美封面图片，支持多种自定义选项，适用于博客、短视频、社交媒体等场景</p>
            </a>

            <a href="watermark-tool/index.html" class="tool-card">
                <div class="tool-icon">🖼️</div>
                <h2>短视频去水印</h2>
                <p>轻松去除短视频中的水印，支持多种平台，快速处理</p>
            </a>

            <div class="tool-card" style="opacity: 0.6; cursor: not-allowed;">
                <div class="tool-icon">✨</div>
                <h2>更多工具</h2>
                <p>持续更新中，敬请期待...</p>
                <span class="coming-soon">即将推出</span>
            </div>
        </div>

        <footer>
            <p>© 2024 在线工具集 | 由 EdgeOne 提供加速</p>
        </footer>
    </div>
</body>
</html>
